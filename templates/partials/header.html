<div class="header-bar">
  {{ navigation::breadcrumb() }}
  {{ navigation::menu() }}
  {% if config.extra.enable_theme_switcher or config.extra.enable_search %}
  <div class="header-actions">
    {% if config.extra.enable_search %}
    <button class="search-toggle" id="search-toggle" aria-label="Open search">
      {{- widgets::icon(name="magnifying-glass") -}}
    </button>
    {% endif %}
    {% if config.extra.enable_theme_switcher %}
    <span class="header-sep">|</span>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
      {{- widgets::icon(name="moon", class="icon-light-mode") -}}
      {{- widgets::icon(name="sun", class="icon-dark-mode") -}}
    </button>
    {% endif %}
  </div>
  {% endif %}
</div>
