<!DOCTYPE html>
<html lang="{{ config.default_language | default(value="en") }}" dir="{{ config.extra.language_direction | default(value="ltr") }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title | default(value="Site") }}{% endblock title %}</title>
</head>
<body>
  <header>
    {% include "partials/header.html" %}
  </header>
  <main>
    {% block content %}{% endblock content %}
  </main>
  <footer>
    {% include "partials/footer.html" %}
  </footer>
</body>
</html>
