# The URL the site will be built for
base_url = "https://zola-yolk.gauthamchettiar.com"
title = "zola-yolk"
compile_sass = true
build_search_index = true
taxonomies = [
    { name = "tags" },
]

[markdown]
definition_list = true
bottom_footnotes = true

[markdown.highlighting]
style = "class"
light_theme = "catppuccin-latte"
dark_theme = "catppuccin-mocha"

[extra]
# Sections to include in the recent posts widget (folder names under content/).
# Defaults to all root-level sections if not set.
content_sections = ["posts"]

# Set to true to show a dark/light mode toggle button in the header
enable_theme_switcher = true

# Set to true to show a search button in the header (requires build_search_index = true)
enable_search = true

# Footer text (plain text or HTML).
footer = "Made with ❤️ for [zola](https://www.getzola.org/)"

# Self-hosted fonts to load. Each entry needs a source (subfolder under static/fonts/)
# and a name matching the synced folder under that source.
[[extra.fonts]]
source = "google"
name = "IBM Plex Mono"

[[extra.main_menu]]
name = "Posts"
url = "/posts"

[[extra.main_menu]]
name = "Tags"
url = "/tags"
