{% if config.extra.enable_theme_switcher %}
<script>
  (function () {
    const STORAGE_KEY = "theme";
    const root = document.documentElement;

    function updateSyntaxTheme(theme) {
      var darkLink = document.getElementById("giallo-dark");
      var lightLink = document.getElementById("giallo-light");
      if (!darkLink || !lightLink) return;
      if (theme === "dark") {
        darkLink.media = "all";
        lightLink.media = "not all";
      } else {
        lightLink.media = "all";
        darkLink.media = "not all";
      }
    }

    function applyTheme(theme) {
      root.setAttribute("data-theme", theme);
      localStorage.setItem(STORAGE_KEY, theme);
      updateSyntaxTheme(theme);
    }

    // On load: respect stored preference, then OS preference
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      applyTheme(stored);
    } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
      applyTheme("dark");
    } else {
      applyTheme("light");
    }

    document.addEventListener("DOMContentLoaded", function () {
      const btn = document.getElementById("theme-toggle");
      if (!btn) return;

      btn.addEventListener("click", function () {
        const isDark = root.getAttribute("data-theme") === "dark";
        applyTheme(isDark ? "light" : "dark");
      });
    });
  })();
</script>
{% endif %}

{% if config.extra.enable_search %}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var modal    = document.getElementById("search-modal");
    var input    = document.getElementById("search-input");
    var results  = document.getElementById("search-results");
    var openBtn  = document.getElementById("search-toggle");
    var closeBtn = document.getElementById("search-close");
    var backdrop = document.getElementById("search-backdrop");

    if (!modal) return;

    var cachedIndex = null;

    function openModal() {
      modal.removeAttribute("hidden");
      input.value = "";
      results.innerHTML = "";
      input.focus();
    }

    function closeModal() {
      modal.setAttribute("hidden", "");
    }

    if (openBtn)  openBtn.addEventListener("click", openModal);
    if (closeBtn) closeBtn.addEventListener("click", closeModal);
    if (backdrop) backdrop.addEventListener("click", closeModal);

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeModal();
      if ((e.ctrlKey || e.metaKey) && e.key === "k") {
        e.preventDefault();
        openModal();
      }
    });

    modal.addEventListener("keydown", function (e) {
      if (e.key !== "ArrowDown" && e.key !== "ArrowUp") return;
      e.preventDefault();
      var links = Array.from(results.querySelectorAll("a"));
      if (!links.length) return;
      var active = document.activeElement;
      var idx = links.indexOf(active);
      if (e.key === "ArrowDown") {
        if (idx === -1 || idx === links.length - 1) links[0].focus();
        else links[idx + 1].focus();
      } else {
        if (idx <= 0) input.focus();
        else links[idx - 1].focus();
      }
    });

    input.addEventListener("input", function () {
      var query = input.value.trim();
      results.innerHTML = "";
      if (!query || query.length < 2) return;

      if (!window.searchIndex) return;
      if (!cachedIndex) {
        cachedIndex = elasticlunr.Index.load(window.searchIndex);
      }
      var index = cachedIndex;

      var hits = index.search(query, {
        fields: { title: { boost: 2 }, body: { boost: 1 } },
        expand: true
      });

      if (hits.length === 0) {
        var empty = document.createElement("li");
        empty.className = "search-modal__results__empty";
        empty.textContent = 'No results for "' + query + '"';
        results.appendChild(empty);
        return;
      }

      hits.slice(0, 8).forEach(function (hit) {
        var doc = index.documentStore.getDoc(hit.ref);
        var li  = document.createElement("li");
        var a   = document.createElement("a");
        a.href  = hit.ref;

        var title = document.createElement("div");
        title.className = "search-modal__results__title";
        title.textContent = doc.title || hit.ref;

        var summary = document.createElement("div");
        summary.className = "search-modal__results__summary";
        var bodyText = (doc.body || "").replace(/<[^>]+>/g, "");
        summary.textContent = bodyText.slice(0, 160) + (bodyText.length > 160 ? "..." : "");

        a.appendChild(title);
        if (summary.textContent) a.appendChild(summary);
        li.appendChild(a);
        results.appendChild(li);
      });
    });
  });
</script>
{% endif %}
