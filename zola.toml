# The URL the site will be built for
base_url = "https://example.com"
title = "zola-yolk"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

taxonomies = [
    { name = "tags" },
]

[markdown]
definition_list = true
bottom_footnotes = true

[markdown.highlighting]
style = "class"
light_theme = "catppuccin-latte"
dark_theme = "catppuccin-mocha"

[extra]
# Sections to include in the recent posts widget (folder names under content/)
content_sections = ["posts"]

# Google Fonts to load.
google_fonts = [
    "IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400",
]

# Set to true when any icon shortcode or widget is used in the site
enable_font_awesome_icon = true

# Set to true to show a dark/light mode toggle button in the header
enable_theme_switcher = true

# Set to true to show a search button in the header (requires build_search_index = true)
enable_search = true

[[extra.main_menu]]
name = "Posts"
url = "/posts"

[[extra.main_menu]]
name = "Tags"
url = "/tags"
