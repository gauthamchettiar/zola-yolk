<!DOCTYPE html>
<html lang="{{ config.default_language | default(value="en") }}" dir="{{ config.extra.language_direction | default(value="ltr") }}">
<head>
  <title>{% block title %}{{ config.title | default(value="Site") }}{% endblock title %}</title>
  {% include "partials/head.html" %}
</head>
<body>
  <header>
    {% include "partials/header.html" %}
  </header>
  <main>
    {% block content %}{% endblock content %}
  </main>
  <footer>
    {% include "partials/footer.html" %}
  </footer>
  {% if config.extra.search %}
  {% include "partials/widgets/search_modal.html" %}
  <script src="{{ get_url(path="elasticlunr.min.js") }}"></script>
  <script src="{{ get_url(path="search_index." ~ config.default_language ~ ".js") }}"></script>
  {% endif %}
</body>
</html>
